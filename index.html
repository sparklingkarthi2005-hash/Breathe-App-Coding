<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BreatheIn Pro - Ultimate Wellness Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }
        .breathe-circle { animation: breathe 8s infinite ease-in-out; }
    </style>
</head>
<body id="body-theme" class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen p-4 transition-colors duration-300">

    <!-- Dark/Light Mode Toggle Button -->
    <div class="absolute top-4 right-4">
        <button onclick="toggleTheme()" class="bg-slate-800 dark:bg-slate-200 text-slate-200 dark:text-slate-900 px-4 py-2 rounded-xl text-sm font-semibold shadow-md cursor-pointer border border-slate-700">
            🌓 Toggle Mode
        </button>
    </div>

    <div id="card-theme" class="max-w-md w-full text-center space-y-6 bg-slate-800 p-8 rounded-2xl shadow-xl border border-slate-700 transition-colors duration-300">
        <div class="flex justify-between items-center">
            <h1 class="text-3xl font-bold tracking-tight text-emerald-400">BreatheIn Pro 🌿</h1>
            <!-- Streak Feature -->
            <div class="bg-slate-700 px-3 py-1 rounded-full text-sm font-bold text-orange-400 flex items-center gap-1">
                🔥 Streak: <span id="streak-count">0</span>
            </div>
        </div>
        
        <p class="text-slate-400 text-sm">Take a personalized break to reset your mind and protect your health.</p>

        <!-- Mode Selectors (1 min, 3 min, 5 min) -->
        <div id="mode-selectors" class="flex justify-center gap-2">
            <button onclick="setDuration(60, this)" class="mode-btn bg-emerald-500 text-slate-900 px-3 py-1.5 rounded-lg text-xs font-bold cursor-pointer">1 Min</button>
            <button onclick="setDuration(180, this)" class="mode-btn bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg text-xs font-bold cursor-pointer">3 Min</button>
            <button onclick="setDuration(300, this)" class="mode-btn bg-slate-700 text-slate-300 px-3 py-1.5 rounded-lg text-xs font-bold cursor-pointer">5 Min</button>
        </div>

        <!-- Breathing Animation Circle -->
        <div class="flex justify-center py-4">
            <div id="circle" class="w-32 h-32 rounded-full bg-blue-500 flex items-center justify-center text-xl font-bold transition-all duration-500 shadow-lg shadow-emerald-500/20">
                <span id="text">Get Ready</span>
            </div>
        </div>

        <div class="space-y-4">
            <button id="start-btn" onclick="startExercise()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-slate-900 font-bold py-3 px-6 rounded-xl transition duration-200 cursor-pointer">
                Start Session
            </button>
            <p id="timer" class="text-sm text-slate-500 hidden">Time remaining: <span id="timer-sec" class="font-mono text-emerald-400 font-bold">60</span>s</p>
        </div>
    </div>

    <script {is_windows_os_user_context}>
        let timeLeft = 60;
        let totalDuration = 60;
        let timerId;
        let textInterval;
        let isDarkMode = true;

        // HTML5 Web Audio API - Smooth procedural tone generation (No external files needed!)
        let audioCtx;
        let oscillator;
        let gainNode;

        function initAudio() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            oscillator = audioCtx.createOscillator();
            gainNode = audioCtx.createGain();
            
            oscillator.type = 'sine'; 
            oscillator.frequency.setValueAtTime(150, audioCtx.currentTime); // Relaxing low frequency
            gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime); // Very soft volume
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();
        }

        // 1. Streak Feature Logic (Using LocalStorage)
        document.addEventListener("DOMContentLoaded", () => {
            let streak = localStorage.getItem("breathe_streak") || 0;
            document.getElementById("streak-count").innerText = streak;
        });

        // 2. Multiple Timers Feature
        function setDuration(seconds, btn) {
            timeLeft = seconds;
            totalDuration = seconds;
            document.getElementById("timer-sec").innerText = seconds;
            
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.remove('bg-emerald-500', 'text-slate-900');
                b.classList.add('bg-slate-700', 'text-slate-300');
            });
            btn.classList.remove('bg-slate-700', 'text-slate-300');
            btn.classList.add('bg-emerald-500', 'text-slate-900');
        }

        // 3. Dark/Light Mode Feature
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            const body = document.getElementById("body-theme");
            const card = document.getElementById("card-theme");
            
            if (!isDarkMode) {
                body.classList.remove("bg-slate-900", "text-white");
                body.classList.add("bg-slate-100", "text-slate-900");
                card.classList.remove("bg-slate-800", "border-slate-700");
                card.classList.add("bg-white", "border-slate-200", "shadow-md");
            } else {
                body.classList.remove("bg-slate-100", "text-slate-900");
                body.classList.add("bg-slate-900", "text-white");
                card.classList.remove("bg-white", "border-slate-200", "shadow-md");
                card.classList.add("bg-slate-800", "border-slate-700");
            }
        }

        // Core Exercise Logic
        function startExercise() {
            const circle = document.getElementById('circle');
            const text = document.getElementById('text');
            const timer = document.getElementById('timer');
            const startBtn = document.getElementById('start-btn');
            const selectors = document.getElementById('mode-selectors');
            
            // Start calming audio tone
            try { initAudio(); } catch(e) { console.log("Audio setup delayed"); }

            startBtn.disabled = true;
            startBtn.classList.add('opacity-50', 'cursor-not-allowed');
            selectors.classList.add('pointer-events-none', 'opacity-50');
            
            circle.classList.add('breathe-circle');
            circle.style.backgroundColor = '#10b981';
            timer.classList.remove('hidden');
            
            let isScalingUp = true;
            text.innerText = "Inhale...";

            textInterval = setInterval(() => {
                isScalingUp = !isScalingUp;
                text.innerText = isScalingUp ? "Inhale..." : "Exhale...";
                circle.style.backgroundColor = isScalingUp ? '#10b981' : '#3b82f6';
            }, 4000);

            timerId = setInterval(() => {
                timeLeft--;
                document.getElementById('timer-sec').innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    clearInterval(textInterval);
                    if(oscillator) oscillator.stop(); // Stop audio

                    circle.classList.remove('breathe-circle');
                    circle.style.backgroundColor = '#10b981';
                    text.innerText = "Done! ✨";
                    timer.innerHTML = "<span class='text-emerald-500 font-bold'>Great job! Mind reset complete.</span>";

                    // Update Streak in LocalStorage
                    let currentStreak = parseInt(localStorage.getItem("breathe_streak") || 0);
                    currentStreak += 1;
                    localStorage.setItem("breathe_streak", currentStreak);
                    document.getElementById("streak-count").innerText = currentStreak;
                }
            }, 1000);
        }
    </script>
</body>
</html>
